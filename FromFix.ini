;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;                    SEKIRO                            ;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[Borderless Windowed]
; Makes windowed mode run in borderless.
Enabled = false

[Gameplay FOV]
; Adjust "Multiplier" to increase/decrease gameplay FOV.
Multiplier = 1.00

[Unlock Framerate]
; Unlocks the 60fps framerate cap.
Enabled = true

[Unlock Resolutions]
; Unlocks resolution list in windowed mode.
Enabled = true

[Fix Aspect Ratio]
; Stops scaling to 16:9 and fixes various aspect ratio related issues.
Enabled = true

[Fix HUD]
; Fixes vignettes and fades at ultrawide/narrower resolutions.
Enabled = true

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;                 DARK SOULS III                       ;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[DS3 Skip Intro]
; Skips the startup logo/intro movies.
Enabled = true

[DS3 Unlock Framerate]
; Unlocks the 60fps cap via the debug frame limiter.
; NOTE: DS3 ties physics to framerate; values above 60 can cause quirks
; (fall damage, item pickups). TargetFPS is your desired cap.
Enabled = false
TargetFPS = 60

[DS3 Resolution]
; Adds your resolution to the in-game resolution list (ultrawide, Steam Deck,
; etc.) by replacing the 1920x1080 entry, so you can pick it in the game's
; Settings (works in Windowed too). Leave at 0 to disable.
; NOTE: when DS3 Borderless is enabled and this is 0, it defaults to your
; monitor's resolution. Set explicitly to override, e.g.
; Width = 3440, Height = 1440
Width = 0
Height = 0

[DS3 Borderless]
; Borderless fullscreen (like Sekiro's). Pick your resolution in-game in
; WINDOWED mode (add it via DS3 Resolution above if it's not listed), then
; enable this: the window becomes a full-monitor borderless popup. No exclusive
; fullscreen, so alt-tab is instant and never minimises, and the taskbar hides.
Enabled = false
