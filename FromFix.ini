;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;                    SEKIRO                            ;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[Borderless Windowed]
; Makes windowed mode run in borderless.
Enabled = false

[Gameplay FOV]
; Adjust "Multiplier" to increase/decrease gameplay FOV.
Multiplier = 1.00

[Unlock Framerate]
; Unlocks the 60fps framerate cap.
Enabled = true

[Unlock Resolutions]
; Unlocks resolution list in windowed mode.
Enabled = true

[Fix Aspect Ratio]
; Stops scaling to 16:9 and fixes various aspect ratio related issues.
Enabled = true

[Fix HUD]
; Fixes vignettes and fades at ultrawide/narrower resolutions.
Enabled = true

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;                 DARK SOULS III                       ;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[DS3 Skip Intro]
; Skips the startup logo/intro movies.
Enabled = true

[DS3 Unlock Framerate]
; Unlocks the 60fps cap via the debug frame limiter.
; NOTE: DS3 ties physics to framerate; values above 60 can cause quirks
; (fall damage, item pickups). TargetFPS is your desired cap.
Enabled = false
TargetFPS = 60

[DS3 Borderless]
; Forces borderless fullscreen at your desktop resolution.
Enabled = false

[DS3 Resolution]
; Set DS3's native/internal resolution (ultrawide, Steam Deck, etc.) by
; replacing the game's hardcoded 1280x720 reference. Leave at 0 to disable.
; Example: Width = 3440, Height = 1440
Width = 0
Height = 0
